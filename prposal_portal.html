<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Metrics — Proposal Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d1117;--ink-2:#3a3f4a;--ink-3:#8a909d;
  --surface:#fff;--surface-2:#f5f6f8;--surface-3:#eceef2;
  --gold:#c8972a;--gold-light:#faeeda;
  --green:#1a6b4a;--green-light:#e8f5ef;
  --red:#c0392b;--border:#dde0e8;
  --radius:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;background:var(--ink);color:var(--ink)}
body{display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  height:56px;flex-shrink:0;
  background:#080a0d;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.topbar-logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.topbar-mark{width:30px;height:30px;background:var(--gold);border-radius:6px;display:grid;place-items:center;font-family:'DM Serif Display',serif;font-size:15px;color:var(--ink);font-weight:400}
.topbar-name{font-size:14px;font-weight:500;color:rgba(255,255,255,.88)}
.topbar-sub{font-size:10px;color:var(--gold);letter-spacing:.09em;text-transform:uppercase}
.topbar-label{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:.04em}

/* ── SHELL ── */
.shell{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── SIDEBAR ── */
.sidebar{
  width:300px;flex-shrink:0;
  background:#0e1118;
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.sidebar-top{
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.sidebar-eyebrow{
  font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}

/* Installer cards */
.installer-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}

.inst-card{
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:var(--radius);
  padding:11px 13px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all .2s;
}
.inst-card:hover{border-color:rgba(200,150,42,.4);background:rgba(200,150,42,.05)}
.inst-card.active{border-color:var(--gold);background:rgba(200,150,42,.08)}

.inst-avatar{
  width:34px;height:34px;border-radius:7px;
  background:#1e2535;
  display:grid;place-items:center;
  font-weight:700;font-size:13px;color:rgba(255,255,255,.5);
  flex-shrink:0;overflow:hidden;
}
.inst-avatar img{width:100%;height:100%;object-fit:cover}
.inst-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.82);line-height:1.3}
.inst-email{font-size:11px;color:rgba(255,255,255,.3);margin-top:1px}
.inst-check{margin-left:auto;font-size:11px;color:var(--gold);opacity:0;transition:opacity .2s}
.inst-card.active .inst-check{opacity:1}

/* Client list */
.client-section{
  flex:1;overflow-y:auto;
  padding:16px 20px;
}
.client-section::-webkit-scrollbar{width:4px}
.client-section::-webkit-scrollbar-track{background:transparent}
.client-section::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.section-label{
  font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
  margin-bottom:10px;
}

.search-input{
  width:100%;padding:9px 12px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:8px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;color:rgba(255,255,255,.8);
  outline:none;margin-bottom:12px;
  transition:border-color .2s;
}
.search-input::placeholder{color:rgba(255,255,255,.25)}
.search-input:focus{border-color:rgba(200,150,42,.4)}

.client-list{display:flex;flex-direction:column;gap:4px}

.client-row{
  border-radius:8px;
  padding:10px 12px;
  cursor:pointer;
  transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.client-row:hover{background:rgba(255,255,255,.05)}
.client-row.active{background:rgba(200,150,42,.1);border:1px solid rgba(200,150,42,.25)}
.client-row:not(.active){border:1px solid transparent}

.client-info{flex:1;min-width:0}
.client-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.82);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-email{font-size:11px;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.proposal-badge{
  flex-shrink:0;
  font-size:10px;font-weight:500;
  padding:2px 7px;border-radius:10px;
}
.badge-ready{background:var(--green-light);color:var(--green)}
.badge-none{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}

.empty-state{
  text-align:center;padding:32px 16px;
  font-size:13px;color:rgba(255,255,255,.25);
  line-height:1.6;
}

/* Skeleton */
.skel{height:46px;border-radius:8px;margin-bottom:4px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── PREVIEW AREA ── */
.preview-area{
  flex:1;
  display:flex;flex-direction:column;
  background:#525659;
  min-width:0;
  position:relative;
}

/* Empty state */
.preview-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0e1118;
  color:rgba(255,255,255,.25);
  gap:16px;
  text-align:center;
  padding:40px;
}
.preview-empty-icon{
  width:64px;height:64px;border-radius:50%;
  background:rgba(255,255,255,.04);
  display:grid;place-items:center;
  font-size:28px;
  margin-bottom:4px;
}
.preview-empty-title{font-size:16px;font-weight:500;color:rgba(255,255,255,.5)}
.preview-empty-sub{font-size:13px;color:rgba(255,255,255,.22);max-width:280px;line-height:1.6}

/* Loading */
.preview-loading{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0e1118;gap:14px;
}
.loading-spinner{
  width:36px;height:36px;
  border:3px solid rgba(200,150,42,.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:rgba(255,255,255,.3)}

/* Iframe */
.preview-iframe{
  flex:1;width:100%;height:100%;border:none;display:block;
}

.preview-empty,.preview-loading,.preview-iframe{position:absolute;inset:0}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">
    <div class="topbar-mark">N</div>
    <div>
      <div class="topbar-name">Nova Metrics</div>
      <div class="topbar-sub">Solar Intelligence</div>
    </div>
  </a>
  <div class="topbar-label">Proposal Portal</div>
</div>

<div class="shell">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-top">
      <div class="sidebar-eyebrow">Installer account</div>
      <div class="installer-list" id="installerList">
        <div class="skel"></div>
        <div class="skel"></div>
      </div>
    </div>

    <div class="client-section" id="clientSection">
      <div class="section-label" id="clientSectionLabel">Select an installer above</div>
      <input class="search-input" id="searchInput" placeholder="Search clients…" oninput="filterClients()" style="display:none">
      <div class="client-list" id="clientList"></div>
    </div>

  </div>

  <!-- PREVIEW AREA -->
  <div class="preview-area">
    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">📄</div>
      <div class="preview-empty-title">Select a client to preview</div>
      <div class="preview-empty-sub">Choose an installer account, then pick a client with a generated proposal</div>
    </div>
    <div class="preview-loading" id="previewLoading" style="display:none">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading proposal preview…</div>
    </div>
    <iframe class="preview-iframe" id="previewFrame" src="" title="Proposal Preview" style="display:none" allowfullscreen></iframe>
  </div>

</div>

<script>
var SUPABASE_URL  = 'https://zloxcqrhkcohheeixfns.supabase.co';
var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsb3hjcXJoa2NvaGhlZWl4Zm5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5MzYwMDAsImV4cCI6MjA3ODUxMjAwMH0.ijtsZHbv1aadnOBv1WOkhILsiHEeSLZkJ-iwr2KROdg';
var REVIEW_BASE   = SUPABASE_URL + '/functions/v1/installer-review/';
var ANON_HDR      = { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON };

var selectedInstallerId = null;
var allClients = [];
var proposalMap = {}; // client_email -> ai_id

window.addEventListener('DOMContentLoaded', loadInstallers);

// ── LOAD INSTALLERS ──────────────────────────────────────────────────────────
function loadInstallers() {
  fetch(SUPABASE_URL + '/rest/v1/installers?select=installer_id,installer_name,contact_email,logo_url,primary_color&order=installer_name.asc', { headers: ANON_HDR })
    .then(function(r){ return r.json(); })
    .then(renderInstallers)
    .catch(function(){ document.getElementById('installerList').innerHTML = '<div style="color:#c0392b;font-size:12px;padding:8px 0">Failed to load. Please refresh.</div>'; });
}

function renderInstallers(list) {
  var el = document.getElementById('installerList');
  if (!list || !list.length) { el.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:12px">No installer accounts found.</div>'; return; }
  el.innerHTML = list.map(function(inst) {
    var bg = inst.primary_color || '#1e2535';
    var initials = inst.installer_name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var lum = 128;
    if (bg && bg.length >= 7) { var r=parseInt(bg.slice(1,3),16),g=parseInt(bg.slice(3,5),16),b=parseInt(bg.slice(5,7),16); lum=0.299*r+0.587*g+0.114*b; }
    var fg = lum < 145 ? '#fff' : '#1a1a1a';
    var avatar = inst.logo_url ? '<img src="'+inst.logo_url+'" alt="'+initials+'" onerror="this.style.display=\'none\'">' : initials;
    return '<div class="inst-card" data-id="'+inst.installer_id+'" data-name="'+inst.installer_name.replace(/"/g,'&quot;')+'" onclick="selectInstaller(this)">'
      + '<div class="inst-avatar" style="background:'+bg+';color:'+fg+'">'+avatar+'</div>'
      + '<div><div class="inst-name">'+inst.installer_name+'</div><div class="inst-email">'+(inst.contact_email||'')+'</div></div>'
      + '<div class="inst-check">✓</div>'
      + '</div>';
  }).join('');
}

function selectInstaller(el) {
  document.querySelectorAll('.inst-card').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  selectedInstallerId = parseInt(el.dataset.id);
  loadClients(selectedInstallerId);
}

// ── LOAD CLIENTS + PROPOSALS ─────────────────────────────────────────────────
function loadClients(installerId) {
  var label = document.getElementById('clientSectionLabel');
  var listEl = document.getElementById('clientList');
  var search = document.getElementById('searchInput');
  label.textContent = 'Loading clients…';
  search.style.display = 'none';
  listEl.innerHTML = '<div class="skel"></div><div class="skel"></div><div class="skel"></div>';

  // Fetch clients + their latest proposals in parallel
  Promise.all([
    fetch(SUPABASE_URL + '/rest/v1/clients?select=id,client_name,client_email,client_phone&installer_id=eq.'+installerId+'&order=client_name.asc', { headers: ANON_HDR }).then(function(r){return r.json();}),
    fetch(SUPABASE_URL + '/rest/v1/ai_results?select=ai_id,client_email&not.pdf_url=is.null&order=ai_id.desc', { headers: ANON_HDR }).then(function(r){return r.json();})
  ]).then(function(results) {
    var clients  = results[0] || [];
    var proposals = results[1] || [];

    // Build email → latest ai_id map
    proposalMap = {};
    proposals.forEach(function(p) {
      if (p.client_email && !proposalMap[p.client_email]) {
        proposalMap[p.client_email] = p.ai_id;
      }
    });

    allClients = clients;
    label.textContent = clients.length + ' client' + (clients.length !== 1 ? 's' : '');
    search.style.display = clients.length > 4 ? 'block' : 'none';
    renderClients(clients);
  }).catch(function(err) {
    listEl.innerHTML = '<div style="color:#c0392b;font-size:12px;padding:8px 0">Failed to load clients.</div>';
  });
}

function renderClients(list) {
  var el = document.getElementById('clientList');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty-state">No clients yet.<br>Add one from the installer portal.</div>';
    return;
  }
  el.innerHTML = list.map(function(c) {
    var aiId = proposalMap[c.client_email];
    var hasProp = !!aiId;
    var badge = hasProp
      ? '<span class="proposal-badge badge-ready">Proposal ready</span>'
      : '<span class="proposal-badge badge-none">No proposal</span>';
    return '<div class="client-row'+(hasProp?'':' no-proposal')+'" data-email="'+c.client_email+'" data-ai="'+(aiId||'')+'" data-name="'+c.client_name.replace(/"/g,'&quot;')+'" onclick="selectClient(this)">'
      + '<div class="client-info"><div class="client-name">'+c.client_name+'</div><div class="client-email">'+c.client_email+'</div></div>'
      + badge
      + '</div>';
  }).join('');
}

function filterClients() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = allClients.filter(function(c) {
    return c.client_name.toLowerCase().includes(q) || c.client_email.toLowerCase().includes(q);
  });
  renderClients(filtered);
}

// ── SELECT CLIENT → AUTO OPEN PREVIEW ───────────────────────────────────────
function selectClient(el) {
  var aiId = el.dataset.ai;
  var name = el.dataset.name;

  document.querySelectorAll('.client-row').forEach(function(r){r.classList.remove('active');});
  el.classList.add('active');

  if (!aiId) {
    showEmpty('No proposal yet for ' + name, 'Generate a proposal in the system, then come back to preview and send it.');
    return;
  }

  showLoading();

  // Small delay so loading state renders before iframe loads
  setTimeout(function() {
    loadPreview(aiId);
  }, 120);
}

function loadPreview(aiId) {
  var frame = document.getElementById('previewFrame');
  frame.src = '';
  frame.onload = function() {
    document.getElementById('previewLoading').style.display = 'none';
    frame.style.display = 'block';
    frame.onload = null;
  };
  frame.src = REVIEW_BASE + aiId;
}

function showEmpty(title, sub) {
  document.getElementById('previewLoading').style.display = 'none';
  document.getElementById('previewFrame').style.display = 'none';
  var empty = document.getElementById('previewEmpty');
  empty.style.display = 'flex';
  empty.querySelector('.preview-empty-title').textContent = title || 'Select a client to preview';
  empty.querySelector('.preview-empty-sub').textContent   = sub   || 'Choose an installer account, then pick a client with a generated proposal';
}

function showLoading() {
  document.getElementById('previewEmpty').style.display = 'none';
  document.getElementById('previewFrame').style.display = 'none';
  document.getElementById('previewLoading').style.display = 'flex';
}
</script>
</body>
</html>
